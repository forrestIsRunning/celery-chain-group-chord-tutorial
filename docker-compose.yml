services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  model-service:
    image: python:3.11-slim
    working_dir: /model
    volumes:
      - ./model_service:/model
      - pip-cache:/root/.cache/pip
    ports:
      - "9000:9000"
    environment:
      - FLASK_APP=app.py
    command: >
      bash -c "pip install flask &&
               flask run --host=0.0.0.0 --port=9000"

  director-web:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    command: >
      bash -c "pip install -r requirements.txt &&
               director db upgrade &&
               director webserver -b 0.0.0.0:8000"

  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    env_file: .env
    depends_on:
      - redis
      - director-web
      - model-service
    command: >
      bash -c "pip install -r requirements.txt &&
               director celery worker --loglevel=INFO"

volumes:
  pip-cache:
